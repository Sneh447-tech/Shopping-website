<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="navbar">
    <h2>🛒 MyShop</h2>
    <div>
        <a href="/products">Shop</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<h2 style="text-align:center;">Your Cart</h2>

<div class="container">

{% for item in items %}

<div class="card">

    <img src="{{ url_for('static', filename='images/' + item.image) }}">

    <h3>{{ item.name }}</h3>

    <p>Price: ₹{{ item.price }}</p>
    <p>Quantity: {{ item.qty }}</p>
    <p>Total: ₹{{ item.subtotal }}</p>

    <a href="/remove/{{ item.id }}">
        <button style="background:red;">Remove</button>
    </a>

</div>

{% endfor %}

</div>

<h2 style="text-align:center;">Grand Total: ₹{{ total }}</h2>

<div style="text-align:center;">
    <a href="/payment">
        <button style="width:200px;">Proceed to Payment</button>
    </a>
</div>

</body>
</html>
